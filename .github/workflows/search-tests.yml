name: Search Library CI - MC/DC Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run BinarySearch MC/DC Tests
        run: |
          dotnet test --no-build --configuration Release \
          --filter "Category=BinarySearch" \
          --logger "trx;LogFileName=Binary_MCDC.trx"

      - name: Run LinearSearch MC/DC Tests
        run: |
          dotnet test --no-build --configuration Release \
          --filter "Category=LinearSearch" \
          --logger "trx;LogFileName=Linear_MCDC.trx"

      - name: Run InterpolationSearch MC/DC Tests
        run: |
          dotnet test --no-build --configuration Release \
          --filter "Category=InterpolationSearch" \
          --logger "trx;LogFileName=Interpolation_MCDC.trx"

      - name: Run All Tests Full Suite
        run: |
          dotnet test --no-build --configuration Release \
          --logger "trx;LogFileName=FullSuite.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 30
